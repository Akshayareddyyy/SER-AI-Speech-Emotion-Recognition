<svg width="800" height="520" viewBox="0 0 800 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Microphone and sound waves illustration">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7afcff"/>
      <stop offset="100%" stop-color="#9b6cff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1226"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="520" rx="24" fill="url(#g2)" />
  <g transform="translate(120,80)">
    <rect x="0" y="0" width="560" height="360" rx="18" fill="rgba(255,255,255,0.02)" />
    <g transform="translate(40,30)">
      <!-- Microphone body -->
      <ellipse cx="120" cy="90" rx="72" ry="90" fill="url(#g1)" opacity="0.08" />
      <rect x="80" y="30" width="80" height="120" rx="40" fill="#0b1226" />
      <rect x="92" y="40" width="56" height="100" rx="28" fill="#11131a" />
      <rect x="108" y="56" width="24" height="64" rx="12" fill="#7afcff" opacity="0.14" />
      <!-- Mic stand -->
      <rect x="118" y="150" width="4" height="50" fill="#9b6cff" opacity="0.9" />
      <ellipse cx="120" cy="210" rx="48" ry="8" fill="#0b1226" opacity="0.6" />
      <!-- Sound waves -->
      <g transform="translate(240,70)">
        <path d="M0 64 C 40 20, 80 20, 120 64" stroke="#7afcff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.95" />
        <path d="M0 40 C 40 0, 80 0, 120 40" stroke="#9b6cff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85" />
        <path d="M0 88 C 40 44, 80 44, 120 88" stroke="#7afcff" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6" />
      </g>
      <!-- Stylized waveform bars -->
      <g transform="translate(40,180)">
        <rect x="0" y="0" width="8" height="36" rx="3" fill="#7afcff" opacity="0.9" />
        <rect x="18" y="0" width="8" height="60" rx="3" fill="#9b6cff" opacity="0.9" />
        <rect x="36" y="0" width="8" height="24" rx="3" fill="#7afcff" opacity="0.9" />
        <rect x="54" y="0" width="8" height="72" rx="3" fill="#9b6cff" opacity="0.9" />
        <rect x="72" y="0" width="8" height="44" rx="3" fill="#7afcff" opacity="0.9" />
        <rect x="90" y="0" width="8" height="56" rx="3" fill="#9b6cff" opacity="0.9" />
      </g>
    </g>
  </g>
</svg>
